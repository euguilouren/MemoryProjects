name: Build APK — Sentinela

on:
  push:
    paths:
      - 'sentinela/**'
      - '.github/workflows/android-sentinela.yml'
  workflow_dispatch:

# Menor privilégio: o padrão é só leitura; só o job de release eleva para escrita.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK (não-depurável) via wrapper
        working-directory: sentinela
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Preparar APK (copiar para a raiz)
        run: cp sentinela/app/build/outputs/apk/release/app-release.apk sentinela.apk

      - name: Publicar APK como artefato (baixável na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: sentinela-apk
          path: sentinela.apk

  # Anexa o APK ao Release só ao publicar uma tag v* — único job com escrita.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar o APK do job de build
        uses: actions/download-artifact@v4
        with:
          name: sentinela-apk

      - name: Anexar APK ao Release
        uses: softprops/action-gh-release@v2
        with:
          files: sentinela.apk
