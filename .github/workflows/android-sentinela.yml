name: Build APK — Sentinela

on:
  push:
    paths:
      - 'sentinela/**'
      - '.github/workflows/android-sentinela.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK (não-depurável)
        working-directory: sentinela
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Preparar APK (copiar para a raiz)
        run: cp sentinela/app/build/outputs/apk/release/app-release.apk sentinela.apk

      - name: Publicar APK como artefato (baixável na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: sentinela-apk
          path: sentinela.apk

      - name: Anexar APK ao Release (ao publicar uma tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: sentinela.apk
