# Configuracao do ruff (linter) do pipeline de entregaveis. Fixa a regua de
# estilo que o check.sh aplica como gate: o conjunto de regras e o tamanho de
# linha ficam versionados aqui, nao no comando — assim o gate e reproduzivel
# (mesma regua local e no CI) e a evolucao da regra passa por revisao no Git.
#
# Conjunto de regras: o PADRAO do ruff (E4/E7/E9 de pycodestyle + F do
# pyflakes) — o mesmo com que a base foi validada a zero erro. line-length=100
# acomoda o codigo atual sem reflow; E501 nao esta no select padrao, entao nao
# reprova por comprimento (regua de estilo, nao de formatacao automatica).

[tool.ruff]
line-length = 100
target-version = "py310"
