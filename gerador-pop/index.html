<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gerador de POP — Procedimento Operacional Padrão</title>
<style>
  :root{ --bg:#0f1115; --pane:#171a21; --ink:#e9ecf2; --muted:#9aa3b2; --line:#2a2f3a;
         --azul:#2563eb; --azul2:#1d4ed8; --ok:#16a34a; --doc:#ffffff; --docink:#1f2430;
         --marca:#2563eb; }   /* --marca: cor da marca, ajustada por JS em documentElement */
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  #topo{ position:sticky; top:0; z-index:10; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    padding:10px 14px; background:#0c0e12; border-bottom:1px solid var(--line); }
  #topo b{ font-size:15px; margin-right:auto; }
  button{ font:inherit; font-size:13px; padding:8px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--pane); color:var(--ink); cursor:pointer; }
  button:hover{ border-color:var(--azul); }
  button.pri{ background:var(--azul); border-color:var(--azul); color:#fff; }
  button.pri:hover{ background:var(--azul2); }
  #wrap{ display:grid; grid-template-columns:minmax(320px,440px) 1fr; gap:0; height:calc(100% - 53px); }
  #form{ overflow:auto; padding:16px; border-right:1px solid var(--line); }
  #previewWrap{ overflow:auto; background:#5b616e; padding:24px; }
  h3{ font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
    margin:18px 0 8px; border-bottom:1px solid var(--line); padding-bottom:4px; }
  label{ display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
  input,textarea,select{ width:100%; padding:8px 10px; border-radius:7px; border:1px solid var(--line);
    background:#0e1117; color:var(--ink); font:inherit; font-size:13px; outline:none; }
  input:focus,textarea:focus{ border-color:var(--azul); }
  textarea{ resize:vertical; min-height:48px; }
  .row{ display:flex; gap:8px; } .row>*{ flex:1; }
  .passo{ border:1px solid var(--line); border-radius:8px; padding:10px; margin:8px 0; background:#0e1117; }
  .passo .cab{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .passo .num{ width:26px; height:26px; border-radius:50%; background:var(--azul); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex:none; }
  .passo .x{ margin-left:auto; cursor:pointer; color:var(--muted); border:1px solid var(--line);
    border-radius:6px; padding:2px 8px; } .passo .x:hover{ color:#ff7a7a; }
  .mini{ font-size:11px; color:var(--muted); margin-top:2px; }
  /* Documento (POP) */
  #documento{ background:var(--doc); color:var(--docink); width:210mm; min-height:297mm; margin:0 auto;
    padding:18mm 18mm 22mm; box-shadow:0 8px 40px rgba(0,0,0,.5); font-size:12px; line-height:1.5; }
  #documento .cab-doc{ display:flex; border:1.5px solid #111; }
  #documento .cab-doc .logo{ width:130px; border-right:1.5px solid #111; display:flex; align-items:center;
    justify-content:center; padding:8px; font-weight:800; color:#111; text-align:center; font-size:13px; }
  #documento .cab-doc .tit{ flex:1; display:flex; flex-direction:column; }
  #documento .cab-doc .tit .l1{ padding:8px 12px; border-bottom:1.5px solid #111; font-weight:700; font-size:15px; }
  #documento .cab-doc .meta{ display:flex; }
  #documento .cab-doc .meta div{ flex:1; padding:5px 10px; border-right:1px solid #111; font-size:11px; }
  #documento .cab-doc .meta div:last-child{ border-right:0; }
  #documento .cab-doc .meta b{ display:block; font-size:9px; text-transform:uppercase; color:#555; letter-spacing:.04em; }
  #documento h2{ font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:#111;
    border-bottom:2px solid var(--marca); padding-bottom:3px; margin:18px 0 8px; }
  #documento p{ margin:4px 0; white-space:pre-wrap; }
  #documento table{ width:100%; border-collapse:collapse; margin:6px 0; }
  #documento th,#documento td{ border:1px solid #bbb; padding:6px 8px; text-align:left; vertical-align:top; font-size:11.5px; }
  #documento th{ background:#eef2ff; color:#111; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; }
  #documento .passo-doc{ display:flex; gap:10px; margin:8px 0; page-break-inside:avoid; }
  #documento .passo-doc .n{ width:24px; height:24px; border-radius:50%; background:var(--marca); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; flex:none; font-size:12px; }
  #documento .passo-doc .c b{ color:#111; }
  #documento .passo-doc .resp{ font-size:10.5px; color:#555; }
  #documento .vazio{ color:#999; font-style:italic; }
  #documento .selo-status{ display:inline-block; border:1px solid currentColor; border-radius:4px;
    padding:1px 7px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
  #documento .fluxo{ display:flex; flex-direction:column; align-items:center; margin:8px 0; }
  #documento .fbox{ display:flex; gap:8px; align-items:center; border:1.5px solid var(--marca); border-radius:8px;
    background:#eef2ff; padding:8px 12px; max-width:80%; page-break-inside:avoid; }
  #documento .fbox .fn{ width:22px; height:22px; border-radius:50%; background:var(--marca); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; flex:none; }
  #documento .fbox b{ color:#111; font-size:11.5px; } #documento .fbox .fresp{ font-size:10px; color:#555; }
  #documento .fseta{ color:var(--marca); font-size:18px; line-height:1; margin:2px 0; }
  /* Capa */
  #documento .capa{ height:255mm; display:flex; flex-direction:column; page-break-after:always; }
  #documento .capa .topo-marca{ height:6mm; background:var(--marca); border-radius:2px; }
  #documento .capa .logo-capa{ margin-top:34mm; text-align:center; }
  #documento .capa .logo-capa img{ max-width:70mm; max-height:40mm; object-fit:contain; }
  #documento .capa .logo-capa .emp{ font-size:20px; font-weight:800; color:#111; }
  #documento .capa .selo{ text-align:center; margin-top:6mm; font-size:11px; letter-spacing:.2em;
    text-transform:uppercase; color:#777; }
  #documento .capa .tit-capa{ margin-top:auto; text-align:center; }
  #documento .capa .tit-capa .ttl{ font-size:30px; font-weight:800; color:#111; line-height:1.15; padding:0 14mm; }
  #documento .capa .tit-capa .sub{ margin-top:6mm; color:var(--marca); font-weight:700; font-size:14px; }
  #documento .capa .meta-capa{ margin-top:auto; border-top:3px solid var(--marca); padding-top:6mm;
    display:flex; flex-wrap:wrap; gap:5mm 0; }
  #documento .capa .meta-capa div{ width:50%; font-size:12px; }
  #documento .capa .meta-capa b{ display:block; font-size:9px; text-transform:uppercase; color:#888; letter-spacing:.05em; }
  /* Rodapé repetido (só impressão) */
  #rodape-print{ display:none; }
  #documento .rodape{ margin-top:22px; border-top:1px solid #ccc; padding-top:8px; font-size:10px; color:#666;
    display:flex; justify-content:space-between; }
  #catalogo{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:20; display:none; align-items:center; justify-content:center; }
  #catalogo .box{ background:var(--pane); border:1px solid var(--line); border-radius:12px; width:560px; max-width:92vw;
    max-height:80vh; overflow:auto; padding:18px; }
  #catalogo h2{ margin:0 0 10px; font-size:16px; }
  .empresa-grupo{ margin:10px 0; } .empresa-grupo .e-nome{ font-weight:700; color:var(--azul); margin-bottom:4px; }
  .pop-item{ display:flex; align-items:center; gap:8px; padding:6px 8px; border:1px solid var(--line);
    border-radius:7px; margin:4px 0; font-size:13px; }
  .pop-item .t{ flex:1; cursor:pointer; } .pop-item .t:hover{ color:var(--azul); }
  .pop-item small{ color:var(--muted); }
  #documento h2{ page-break-after:avoid; }
  #documento table, #documento .passo-doc, #documento .fbox{ page-break-inside:avoid; }
  @media print{
    #topo,#form,#catalogo{ display:none !important; }
    #wrap{ display:block; height:auto; }
    #previewWrap{ overflow:visible; background:#fff; padding:0; }
    #documento{ box-shadow:none; width:auto; min-height:auto; margin:0; padding:0; }
    @page{ size:A4; margin:14mm 14mm 18mm; }
    /* rodapé repetido em todas as páginas */
    #rodape-print{ display:flex !important; position:fixed; bottom:0; left:0; right:0;
      justify-content:space-between; align-items:center; font-size:9px; color:#777;
      border-top:1px solid #ccc; padding:3px 0; }
    #rodape-print b{ color:var(--marca); }
  }
  @media(max-width:820px){ #wrap{ grid-template-columns:1fr; height:auto; } #form{ border-right:0; border-bottom:1px solid var(--line); } #documento{ width:100%; } }
</style>
</head>
<body>
<div id="topo">
  <b>Gerador de POP</b>
  <button onclick="novo()">Novo</button>
  <button onclick="salvar()">Salvar no catálogo</button>
  <button onclick="abrirCatalogo()">Catálogo</button>
  <button onclick="exportarJSON()">Exportar backup</button>
  <button onclick="document.getElementById('imp').click()">Importar backup</button>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importarJSON(this)">
  <button class="pri" onclick="window.print()" title="Dica: para numerar as páginas do PDF (1 de N), ative 'Cabeçalhos e rodapés' na janela de impressão do navegador.">Imprimir / PDF</button>
</div>

<div id="wrap">
  <div id="form">
    <h3>Identificação</h3>
    <label>Empresa</label><input id="empresa" oninput="render()" placeholder="Ex.: Padaria do Bairro Ltda">
    <label>Logo da empresa (opcional)</label>
    <div class="row" style="align-items:center">
      <input type="file" id="logoFile" accept="image/*" onchange="lerLogo(this)">
      <button type="button" onclick="limparLogo()" style="flex:0 0 auto">remover logo</button>
    </div>
    <div class="row" style="align-items:center; margin-top:8px">
      <div style="flex:0 0 auto"><label style="margin:0">Cor da marca</label>
        <input type="color" id="cor" value="#2563eb" oninput="render()" style="width:54px; height:34px; padding:2px"></div>
      <div style="display:flex; align-items:center; gap:6px"><label style="margin:0">
        <input type="checkbox" id="capa" onchange="render()" style="width:auto; vertical-align:middle"> Incluir capa (página de rosto)</label></div>
    </div>
    <label>Título do procedimento</label><input id="titulo" oninput="render()" placeholder="Ex.: Abertura de Caixa">
    <div class="row">
      <div><label>Código</label><input id="codigo" oninput="render()" placeholder="POP-FIN-001"></div>
      <div><label>Versão</label><input id="versao" oninput="render()" placeholder="1.0"></div>
    </div>
    <div class="row">
      <div><label>Área / setor</label><input id="area" oninput="render()" placeholder="Financeiro"></div>
      <div><label>Data</label><input id="data" type="date" oninput="render()"></div>
    </div>
    <label>Status do documento</label>
    <select id="status" onchange="render()">
      <option selected>Rascunho</option>
      <option>Em revisão</option>
      <option>Vigente</option>
      <option>Obsoleto</option>
    </select>

    <h3>Conteúdo</h3>
    <label>Objetivo (para que serve este POP)</label>
    <textarea id="objetivo" oninput="render()" placeholder="Padronizar a abertura do caixa para garantir conferência de troco e segurança."></textarea>
    <label>Abrangência / escopo (onde se aplica, e onde NÃO se aplica)</label>
    <textarea id="escopo" oninput="render()" placeholder="Aplica-se a todos os operadores de caixa das lojas físicas."></textarea>
    <label>Recursos / materiais / sistemas necessários</label>
    <textarea id="recursos" oninput="render()" placeholder="Sistema PDV, fundo de troco, cofre, planilha de conferência."></textarea>

    <h3>Responsabilidades</h3>
    <label>Dono do processo (responsável)</label><input id="dono" oninput="render()" placeholder="Gerente da loja">
    <label>Executores</label><input id="executores" oninput="render()" placeholder="Operador de caixa">

    <h3>Passos do procedimento</h3>
    <div id="passos"></div>
    <button onclick="addPasso()">+ Adicionar passo</button>

    <h3>Encerramento</h3>
    <label>Pontos de atenção / riscos / o que NÃO fazer</label>
    <textarea id="atencao" oninput="render()" placeholder="Nunca deixar o caixa aberto sem operador. Divergência acima de R$5 deve ser reportada."></textarea>
    <label>Indicadores (como medir se o processo vai bem)</label>
    <textarea id="indicadores" oninput="render()" placeholder="Nº de divergências de caixa por mês; tempo médio de abertura."></textarea>
    <label>Documentos / POPs relacionados</label>
    <textarea id="referencias" oninput="render()" placeholder="POP-FIN-002 Fechamento de Caixa; Política de Segurança."></textarea>

    <h3>Histórico de revisões</h3>
    <div id="revisoes"></div>
    <button onclick="addRevisao()">+ Adicionar revisão</button>

    <h3>Aprovação</h3>
    <div class="row">
      <div><label>Elaborado por</label><input id="elaborado" oninput="render()" placeholder="Seu nome"></div>
      <div><label>Aprovado por</label><input id="aprovado" oninput="render()" placeholder="Diretor"></div>
    </div>
    <p class="mini">Dica: para numerar as páginas do PDF (1 de N), ative 'Cabeçalhos e rodapés' na janela de impressão do navegador.</p>
  </div>

  <div id="previewWrap">
    <div id="documento"></div>
  </div>
</div>
<div id="rodape-print"></div>

<div id="catalogo" onclick="if(event.target===this)fecharCatalogo()">
  <div class="box">
    <h2>Catálogo de POPs por empresa</h2>
    <div id="catalogo-lista"></div>
  </div>
</div>

<script>
const CAMPOS = ["empresa","titulo","codigo","versao","area","data","objetivo","escopo","recursos",
  "dono","executores","atencao","indicadores","referencias","elaborado","aprovado"];
const CHAVE = "gerador-pop-catalogo";
let passos = [];
let revisoes = [];
let logoData = "";   // dataURL do logo (opcional)
const STATUS_CORES = { "Rascunho":["#b45309","#fef3c7"], "Em revisão":["#2563eb","#dbeafe"],
  "Vigente":["#15803d","#dcfce7"], "Obsoleto":["#b91c1c","#fee2e2"] };
function seloStatus(st){
  st = st || "Rascunho";
  const [cor,fundo] = STATUS_CORES[st] || STATUS_CORES["Rascunho"];
  return `<span class="selo-status" style="color:${cor};border-color:${cor};background:${fundo}">${esc(st)}</span>`;
}

function lerLogo(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ logoData = r.result; render(); };
  r.readAsDataURL(f);
}
function limparLogo(){ logoData=""; g("logoFile").value=""; render(); }
const esc = s => String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const g = id => document.getElementById(id);

function addPasso(acao="",resp="",detalhe=""){
  passos.push({acao,resp,detalhe}); renderPassos(); render();
}
function renderPassos(){
  g("passos").innerHTML = passos.map((p,i)=>`
    <div class="passo">
      <div class="cab"><span class="num">${i+1}</span>
        <span class="mini">Passo ${i+1}</span>
        <span class="x" onclick="rmPasso(${i})">remover</span></div>
      <input placeholder="Ação (o que fazer)" value="${esc(p.acao)}" oninput="upPasso(${i},'acao',this.value)">
      <input placeholder="Responsável (quem faz)" value="${esc(p.resp)}" oninput="upPasso(${i},'resp',this.value)" style="margin-top:6px">
      <textarea placeholder="Detalhe / como fazer (opcional)" oninput="upPasso(${i},'detalhe',this.value)" style="margin-top:6px">${esc(p.detalhe)}</textarea>
    </div>`).join("");
}
function upPasso(i,k,v){ passos[i][k]=v; render(); }
function rmPasso(i){ passos.splice(i,1); renderPassos(); render(); }

function addRevisao(versao="",data="",descricao="",autor=""){
  revisoes.push({versao,data,descricao,autor}); renderRevisoes(); render();
}
function renderRevisoes(){
  g("revisoes").innerHTML = revisoes.map((r,i)=>`
    <div class="passo">
      <div class="cab"><span class="num">${i+1}</span>
        <span class="mini">Revisão ${i+1}</span>
        <span class="x" onclick="rmRevisao(${i})">remover</span></div>
      <div class="row">
        <input placeholder="Versão (ex.: 1.0)" value="${esc(r.versao)}" oninput="upRevisao(${i},'versao',this.value)">
        <input type="date" value="${esc(r.data)}" oninput="upRevisao(${i},'data',this.value)">
      </div>
      <input placeholder="Descrição da mudança" value="${esc(r.descricao)}" oninput="upRevisao(${i},'descricao',this.value)" style="margin-top:6px">
      <input placeholder="Autor" value="${esc(r.autor)}" oninput="upRevisao(${i},'autor',this.value)" style="margin-top:6px">
    </div>`).join("");
}
function upRevisao(i,k,v){ revisoes[i][k]=v; render(); }
function rmRevisao(i){ revisoes.splice(i,1); renderRevisoes(); render(); }

function dados(){
  const d={}; CAMPOS.forEach(c=>d[c]=g(c).value); d.passos=passos; d.revisoes=revisoes; d.logo=logoData;
  d.cor=g("cor").value; d.capa=g("capa").checked; d.status=g("status").value; return d;
}
function dataBR(iso){ if(!iso) return "—"; const [a,m,dia]=iso.split("-"); return `${dia}/${m}/${a}`; }

function render(){
  const d = dados();
  document.documentElement.style.setProperty("--marca", d.cor||"#2563eb");
  const vazio = t => t ? esc(t) : '<span class="vazio">—</span>';
  const sec = (t,c)=> `<h2>${t}</h2>${c}`;
  // rodapé repetido (impressão)
  g("rodape-print").innerHTML = `<span>${esc(d.empresa||"")} ${d.codigo?"· <b>"+esc(d.codigo)+"</b>":""} ${d.versao?"· v"+esc(d.versao):""}</span>`+
    `<span>${d.titulo?esc(d.titulo):""}</span>`;
  // capa (página de rosto)
  const capaHTML = d.capa ? `
    <div class="capa">
      <div class="topo-marca"></div>
      <div class="logo-capa">${logoData?`<img src="${logoData}" alt="logo">`:`<div class="emp">${esc(d.empresa||"Empresa")}</div>`}</div>
      <div class="selo">Procedimento Operacional Padrão</div>
      <div style="text-align:center; margin-top:3mm">${seloStatus(d.status)}</div>
      <div class="tit-capa"><div class="ttl">${d.titulo?esc(d.titulo):"Título do procedimento"}</div>
        ${d.area?`<div class="sub">${esc(d.area)}</div>`:""}</div>
      <div class="meta-capa">
        <div><b>Código</b>${vazio(d.codigo)}</div>
        <div><b>Versão</b>${vazio(d.versao)}</div>
        <div><b>Data</b>${d.data?dataBR(d.data):'<span class="vazio">—</span>'}</div>
        <div><b>Empresa</b>${vazio(d.empresa)}</div>
        <div><b>Elaborado por</b>${vazio(d.elaborado)}</div>
        <div><b>Aprovado por</b>${vazio(d.aprovado)}</div>
      </div>
    </div>` : "";
  const passosHTML = passos.length ? passos.map((p,i)=>`
    <div class="passo-doc"><span class="n">${i+1}</span>
      <div class="c"><b>${vazio(p.acao)}</b>${p.resp?` <span class="resp">— ${esc(p.resp)}</span>`:""}
      ${p.detalhe?`<p>${esc(p.detalhe)}</p>`:""}</div></div>`).join("")
    : '<p class="vazio">Adicione os passos no formulário ao lado.</p>';

  // fluxograma vertical: uma caixa por passo (ação + responsável), ligadas por seta
  const comAcao = passos.filter(p=>p.acao);
  const fluxoHTML = comAcao.length ? `<div class="fluxo">` + comAcao.map((p,i)=>`
    <div class="fbox"><span class="fn">${i+1}</span><div><b>${esc(p.acao)}</b>${p.resp?`<div class="fresp">${esc(p.resp)}</div>`:""}</div></div>
    ${i<comAcao.length-1?'<div class="fseta">&#x2193;</div>':''}`).join("") + `</div>`
    : '<p class="vazio">Preencha a ação dos passos para gerar o fluxo.</p>';

  // histórico de revisões (tabela)
  const revisoesHTML = revisoes.length ? `<table><tr><th>Versão</th><th>Data</th><th>Descrição</th><th>Autor</th></tr>` +
    revisoes.map(r=>`<tr><td>${vazio(r.versao)}</td><td>${r.data?dataBR(r.data):'<span class="vazio">—</span>'}</td>
      <td>${vazio(r.descricao)}</td><td>${vazio(r.autor)}</td></tr>`).join("") + `</table>`
    : '<p class="vazio">Adicione as revisões no formulário ao lado.</p>';

  g("documento").innerHTML = capaHTML + `
    <div class="cab-doc">
      <div class="logo">${logoData?`<img src="${logoData}" alt="logo" style="max-width:114px;max-height:64px;object-fit:contain">`:vazio(d.empresa)}</div>
      <div class="tit">
        <div class="l1">${d.titulo?esc(d.titulo):'<span class="vazio">Título do procedimento</span>'}</div>
        <div class="meta">
          <div><b>Código</b>${vazio(d.codigo)}</div>
          <div><b>Versão</b>${vazio(d.versao)}</div>
          <div><b>Área</b>${vazio(d.area)}</div>
          <div><b>Data</b>${d.data?dataBR(d.data):'<span class="vazio">—</span>'}</div>
          <div><b>Status</b>${seloStatus(d.status)}</div>
        </div>
      </div>
    </div>
    ${sec("1. Objetivo", `<p>${vazio(d.objetivo)}</p>`)}
    ${sec("2. Abrangência", `<p>${vazio(d.escopo)}</p>`)}
    ${sec("3. Responsabilidades", `<table><tr><th>Papel</th><th>Responsável</th></tr>
      <tr><td>Dono do processo</td><td>${vazio(d.dono)}</td></tr>
      <tr><td>Executores</td><td>${vazio(d.executores)}</td></tr></table>`)}
    ${sec("4. Recursos necessários", `<p>${vazio(d.recursos)}</p>`)}
    ${sec("5. Procedimento (passo a passo)", passosHTML)}
    ${sec("6. Fluxo do processo", fluxoHTML)}
    ${sec("7. Pontos de atenção e riscos", `<p>${vazio(d.atencao)}</p>`)}
    ${sec("8. Indicadores", `<p>${vazio(d.indicadores)}</p>`)}
    ${sec("9. Documentos relacionados", `<p>${vazio(d.referencias)}</p>`)}
    ${sec("10. Aprovação", `<table><tr><th>Elaborado por</th><th>Aprovado por</th></tr>
      <tr><td>${vazio(d.elaborado)}</td><td>${vazio(d.aprovado)}</td></tr></table>`)}
    ${sec("11. Histórico de revisões", revisoesHTML)}
    <div class="rodape"><span>${esc(d.empresa||"")} ${d.codigo?"· "+esc(d.codigo):""} ${d.versao?"· v"+esc(d.versao):""}</span>
      <span>POP gerado em ${new Date().toLocaleDateString("pt-BR")}</span></div>`;
}

/* ---- catálogo (localStorage) ---- */
function lerCat(){ try{ return JSON.parse(localStorage.getItem(CHAVE))||[]; }catch(e){ return []; } }
function gravarCat(c){ localStorage.setItem(CHAVE, JSON.stringify(c)); }

function salvar(){
  const d = dados();
  if(!d.empresa || !d.titulo){ alert("Preencha ao menos Empresa e Título para salvar."); return; }
  const cat = lerCat();
  const id = (d.empresa+"|"+d.titulo+"|"+(d.versao||"")).toLowerCase();
  const i = cat.findIndex(x=>x._id===id);
  const reg = {...d, _id:id, _salvo:new Date().toISOString()};
  if(i>=0) cat[i]=reg; else cat.push(reg);
  gravarCat(cat);
  alert("POP salvo no catálogo: "+d.empresa+" — "+d.titulo);
}
function abrirCatalogo(){
  const cat = lerCat();
  const porEmp = {};
  cat.forEach(p=>{ (porEmp[p.empresa]=porEmp[p.empresa]||[]).push(p); });
  const empresas = Object.keys(porEmp).sort();
  g("catalogo-lista").innerHTML = empresas.length ? empresas.map(e=>`
    <div class="empresa-grupo"><div class="e-nome">${esc(e)}</div>
      ${porEmp[e].map(p=>`<div class="pop-item">
        <span class="t" data-carregar="${esc(p._id)}">${esc(p.titulo)} <small>${p.codigo?esc(p.codigo)+" · ":""}v${esc(p.versao||"1.0")}</small></span>
        <button data-excluir="${esc(p._id)}">excluir</button></div>`).join("")}
    </div>`).join("") : '<p style="color:var(--muted)">Nenhum POP salvo ainda. Preencha e clique em “Salvar no catálogo”.</p>';
  // handlers por delegação: o id vem do dataset já decodificado pelo DOM — não injeta dado do usuário em JS inline
  g("catalogo-lista").querySelectorAll("[data-carregar]").forEach(el=> el.onclick=()=>carregar(el.dataset.carregar));
  g("catalogo-lista").querySelectorAll("[data-excluir]").forEach(el=> el.onclick=()=>excluir(el.dataset.excluir));
  g("catalogo").style.display="flex";
}
function fecharCatalogo(){ g("catalogo").style.display="none"; }
function carregar(id){
  const reg = lerCat().find(x=>x._id===id); if(!reg) return;
  CAMPOS.forEach(c=> g(c).value = reg[c]||"");
  passos = (reg.passos||[]).map(p=>({...p}));
  revisoes = (reg.revisoes||[]).map(r=>({...r}));
  logoData = reg.logo||"";
  g("cor").value = reg.cor||"#2563eb"; g("capa").checked = !!reg.capa;
  g("status").value = reg.status||"Rascunho";
  renderPassos(); renderRevisoes(); render(); fecharCatalogo();
}
function excluir(id){
  if(!confirm("Excluir este POP do catálogo?")) return;
  gravarCat(lerCat().filter(x=>x._id!==id)); abrirCatalogo();
}
function novo(){
  if(!confirm("Limpar o formulário? (salve antes se quiser guardar)")) return;
  CAMPOS.forEach(c=> g(c).value=""); passos=[]; revisoes=[]; logoData=""; g("logoFile").value="";
  g("cor").value="#2563eb"; g("capa").checked=false; g("status").value="Rascunho";
  renderRevisoes(); addPasso(); render();
}
function exportarJSON(){
  const blob = new Blob([JSON.stringify(lerCat(),null,2)], {type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download = "catalogo-pops.json"; a.click();
}
function importarJSON(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
    const novos = JSON.parse(r.result);
    if(!Array.isArray(novos)) throw 0;
    const cat = lerCat(); const map = {};
    [...cat,...novos].forEach(p=> map[p._id]=p);
    gravarCat(Object.values(map));
    alert("Backup importado: "+novos.length+" POP(s) mesclados."); abrirCatalogo();
  }catch(e){ alert("Arquivo inválido."); } };
  r.readAsText(f); input.value="";
}

/* init */
g("data").value = new Date().toISOString().slice(0,10);
addPasso("","",""); render();
</script>
</body>
